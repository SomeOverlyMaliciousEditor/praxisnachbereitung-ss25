<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      :root { font-family: -apple-system, system-ui, Segoe UI, Roboto, Ubuntu, Cantarell, Helvetica, Arial; }
      body { margin: 0; padding: 2rem; background: #f3f4f6; }
      .card { max-width: 1200px; margin: 2rem auto; padding: 2rem; background: white; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.05); }
      h1 { margin-top: 0; }
      table { border-collapse: collapse; width: 100%; margin-top: 1.5rem; }
      th, td { border: 1px solid #e5e7eb; padding: .5rem .6rem; text-align: left; font-size: .9rem; }
      th { background: #f9fafb; }
      .btn { display: inline-block; padding: .45rem .9rem; border-radius: 999px; border: none; background: #2563eb; color: white; text-decoration: none; }
      .btn:hover { background: #1d4ed8; }
      .btn-secondary { background: #6b7280; }
      .btn-secondary:hover { background: #4b5563; }
      .mb-3 { margin-bottom: 1rem; }
      .form-label { display:block; font-size: .9rem; margin-bottom: .3rem; }
      .form-control, .form-select { width: 100%; padding: .35rem .55rem; border-radius: 8px; border: 1px solid #d1d5db; }
      .badge { display:inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: .8rem; }
      .bg-danger { background:#dc2626; color:white; }
      .bg-success { background:#16a34a; color:white; }
    </style>
  </head>
  <body>
    <div class="card">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
